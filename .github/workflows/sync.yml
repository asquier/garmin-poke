name: Garmin Sync

on:
  schedule:
    - cron: "*/5 * * * *"  # GitHub Actions' minimum interval
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: garmin-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      TZ: America/Los_Angeles

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Restore monitor state
        uses: actions/cache@v4
        with:
          path: last_check.json
          key: garmin-state-${{ github.run_id }}
          restore-keys: |
            garmin-state-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Garmin monitor
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          POKE_API_KEY: ${{ secrets.POKE_API_KEY }}
        run: uv run garmin_monitor.py
